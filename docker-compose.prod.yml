# Production overlay — mirrors steveackleyorg pattern.
# Pulls a pinned image (no local build), reads .env (chmod 600 on the instance).

services:
  {{PROJECT_NAME}}:
    image: ${IMAGE_REF}
    container_name: {{PROJECT_NAME}}
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "/app/app", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
