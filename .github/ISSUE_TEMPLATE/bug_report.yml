name: Bug report
description: Something is broken.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      placeholder: |
        1. …
        2. …
        3. …
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Image tag or commit SHA where this was observed.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
